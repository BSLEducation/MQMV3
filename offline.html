<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Matching Question Maker — Offline</title>
  <style>
    :root{--bg:#0b0b0c;--accent:#00d1ff;--muted:#9aa3ad;}
    *{box-sizing:border-box;}
    body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:#e6eef6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
    .card{max-width:480px;width:100%;padding:24px 22px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;background:#111;box-shadow:0 10px 28px rgba(0,0,0,0.6);}
    h1{margin:0 0 10px;font-size:24px;color:var(--accent);}
    p{margin:8px 0;color:var(--muted);}
    button{margin-top:14px;padding:10px 16px;border-radius:8px;border:1px solid #222;background:var(--accent);color:#000;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Offline Mode</h1>
    <p>You’re offline. Saved sets and cached assets are still available.</p>
    <p>Reconnect and reload to sync new sets or multiplayer options.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
